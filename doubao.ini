# OpenClash 在线订阅配置模板
# 适配 OpenClash 解析规则，保留所有原策略/规则逻辑
# 版本：OpenClash v0.45+ 通用

[General]
# OpenClash 基础配置（订阅通用默认值）
log-level = info
allow-lan = true
mode = rule
external-controller = 0.0.0.0:9090
external-ui = /etc/openclash/ui
secret = ""
ipv6 = false
enhanced-mode = fake-ip
fake-ip-range = 198.18.0.1/16
dns-listen = 0.0.0.0:53
find-process-mode = strict

[Proxy]
# === 节点占位段 ===
# 请将下方示例替换为你的实际节点订阅内容（支持 vmess/ss/trojan/snell 等）
# 示例格式：
# vmess://eyJhZGQiOiAiMTI3LjAuMC4xIiwgImFpZCI6ICIwIiwgIm5ldCI6ICJ3cyIsICJwYXRoIjogIi8iLCAicG9ydCI6ICI4MDgwIiwgInBzcyI6ICJb5ouJ5Lq6XSDnlLXlv4Horr7lh7rkuozlrZcubXAzIiwgInBzcyI6ICIiLCAic2N5IjogImF1dG8iLCAidGxzIjogIiIsICJ0eXBlIjogInZtZXNzIiwgInVzZXJuYW1lIjogIiJ9
