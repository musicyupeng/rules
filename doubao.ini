🐟 漏网之鱼 = select,🚀 默认代理,🔯 香港故转,🔯 日本故转,🔯 狮城故转,🔯 美国故转,♻️ 香港自动,♻️ 日本自动,♻️ 狮城自动,♻️ 美国自动,♻️ 自动选择,🇭🇰 香港节点,🇯🇵 日本节点,🇸🇬 狮城节点,🇺🇲 美国节点,🌐 全部节点,直连
🇭🇰 香港节点 = select,include-all=true,filter="(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
🇯🇵 日本节点 = select,include-all=true,filter="(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
🇸🇬 狮城节点 = select,include-all=true,filter="(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"
🇺🇲 美国节点 = select,include-all=true,filter="(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"
🔯 香港故转 = fallback,include-all=true,interval=300,filter="(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
🔯 日本故转 = fallback,include-all=true,interval=300,filter="(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
🔯 狮城故转 = fallback,include-all=true,interval=300,filter="(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"
🔯 美国故转 = fallback,include-all=true,interval=300,filter="(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"
♻️ 香港自动 = url-test,include-all=true,tolerance=20,interval=300,filter="(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
♻️ 日本自动 = url-test,include-all=true,tolerance=20,interval=300,filter="(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
♻️ 狮城自动 = url-test,include-all=true,tolerance=20,interval=300,filter="(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"
♻️ 美国自动 = url-test,include-all=true,tolerance=20,interval=300,filter="(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"
♻️ 自动选择 = url-test,include-all=true,tolerance=20,interval=300,filter="^((?!(直连)).)*$"
🌐 全部节点 = select,include-all=true

[Rule]
# 规则匹配
RULE-SET,private_ip,直连,no-resolve
RULE-SET,private_domain,直连
DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理
RULE-SET,proxylite,🚀 默认代理
RULE-SET,ai,🤖 ChatGPT
RULE-SET,github_domain,👨🏿‍💻 GitHub
RULE-SET,youtube_domain,📹 YouTube
RULE-SET,google_domain,🍀 Google
RULE-SET,onedrive_domain,🐬 OneDrive
RULE-SET,microsoft_domain,🪟 Microsoft
RULE-SET,apple_domain,直连
RULE-SET,tiktok_domain,🎵 TikTok
RULE-SET,telegram_domain,📲 Telegram
RULE-SET,netflix_domain,🎥 NETFLIX
RULE-SET,paypal_domain,💶 PayPal
RULE-SET,apple_ip,直连
RULE-SET,google_ip,🍀 Google
RULE-SET,netflix_ip,🎥 NETFLIX
RULE-SET,telegram_ip,📲 Telegram
RULE-SET,geolocation-!cn,🚀 默认代理
RULE-SET,cn_domain,直连
RULE-SET,cn_ip,直连
MATCH,🐟 漏网之鱼

